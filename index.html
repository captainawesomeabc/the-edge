<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EDGE | Proactive AI</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="The Edge">
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Arial', sans-serif; text-align: center; padding: 50px 20px; }
        .logo { font-size: 80px; color: #007bff; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; color: #007bff; }
        p { font-size: 1.2rem; max-width: 600px; margin: 20px auto; line-height: 1.6; }
        .video-container { max-width: 640px; margin: 30px auto; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 123, 255, 0.3); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 10px; }
        .cta-button { display: inline-block; background-color: #007bff; color: #fff; padding: 15px 40px; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 30px; }
        .trial-badge { display: inline-block; background: linear-gradient(135deg, #007bff, #00b4ff); color: #fff; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 10px; }
        .price { font-size: 1.5rem; margin: 10px 0; font-weight: bold; }
        .footer { margin-top: 50px; color: #555; font-size: 0.8rem; }
        .member-login { display: inline-block; margin-top: 15px; color: #007bff; text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; border-bottom: 1px solid #007bff; padding-bottom: 2px; transition: opacity 0.3s; }
        .member-login:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="logo">🏆</div>
    <h1>THE EDGE</h1>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/xxW39hyJC1M?rel=0" title="The Edge" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="pricing">
        <span class="trial-badge">✨ 5-DAY FREE TRIAL</span>
        <div class="price">Then $19.99/mo — Cancel Anytime</div>
    </div>

    <a href="app.html" class="cta-button">START YOUR FREE TRIAL</a>

    <div class="footer">
        &copy; 2026 MindWell Solution Group LLC<br>
        <a href="app.html" class="member-login">Member Login &rarr;</a>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (let registration of registrations) { registration.unregister(); }
            });
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
    </script>
</body>
</html>
