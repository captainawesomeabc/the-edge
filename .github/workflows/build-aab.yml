name: Build Signed AAB
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Suppress SDK warning
        run: echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties
      - name: Fix Gradle wrapper
        run: |
          cd android
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.6
      - name: Decode Keystore
        run: base64 -d android/keystore.b64 > android/keystore.jks
      - name: Build Release AAB
        working-directory: android
        env:
          CM_KEYSTORE_PATH: ${{ github.workspace }}/android/keystore.jks
          CM_KEYSTORE_PASSWORD: DSG-Upload-2026!
          CM_KEY_ALIAS: upload
          CM_KEY_PASSWORD: DSG-Upload-2026!
        run: ./gradlew bundleRelease
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: edge-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
