name: Build Signed AAB
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
          validate-wrappers: false
      - name: Suppress SDK warning
        run: echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties
      - name: Fix Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.6
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks
      - name: Build Release AAB
        working-directory: android
        env:
          CM_KEYSTORE_PATH: ${{ github.workspace }}/android/keystore.jks
          CM_KEYSTORE_PASSWORD: DSG-Upload-2026!
          CM_KEY_ALIAS: upload
          CM_KEY_PASSWORD: DSG-Upload-2026!
        run: ./gradlew bundleRelease
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: edge-signed-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
