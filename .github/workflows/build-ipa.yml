name: Build & Sign iOS IPA

on:
  push:
    branches: [ ios-build ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app

    - name: Import signing certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.DIST_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.DIST_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
        security import $RUNNER_TEMP/certificate.p12 \
          -P "$CERTIFICATE_PASSWORD" \
          -A -t cert -f pkcs12 \
          -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

    - name: Install provisioning profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        PP_PATH=$RUNNER_TEMP/theedge.mobileprovision
        echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
        echo "Installed profile: $UUID"
        echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

    - name: Get Team ID from certificate
      run: |
        TEAM_ID=$(security find-identity -v -p codesigning | grep "iPhone Distribution\|Apple Distribution" | head -1 | awk '{print $3}' | tr -d '"' | awk -F'(' '{print $2}' | tr -d ')')
        echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
        echo "Found Team ID: $TEAM_ID"

    - name: Build archive
      run: |
        cd ios
        xcodebuild archive \
          -project TheEdge.xcodeproj \
          -scheme TheEdge \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath $RUNNER_TEMP/TheEdge.xcarchive \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=${{ env.TEAM_ID }} \
          PROVISIONING_PROFILE=${{ env.PROFILE_UUID }} \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          -allowProvisioningUpdates

    - name: Export IPA
      run: |
        cat > $RUNNER_TEMP/ExportOptions.plist << PLISTEOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>${{ env.TEAM_ID }}</string>
          <key>provisioningProfiles</key>
          <dict>
            <key>guru.theedge.app</key>
            <string>${{ env.PROFILE_UUID }}</string>
          </dict>
          <key>signingStyle</key>
          <string>manual</string>
          <key>stripSwiftSymbols</key>
          <true/>
          <key>uploadBitcode</key>
          <false/>
          <key>uploadSymbols</key>
          <true/>
        </dict>
        </plist>
        PLISTEOF
        
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/TheEdge.xcarchive \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -exportPath $RUNNER_TEMP/export

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: TheEdge-iOS
        path: ${{ runner.temp }}/export/*.ipa
        retention-days: 7
