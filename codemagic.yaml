workflows:
  ios-app-store:
    name: TheEdge iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic-Prova-Build
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: guru.theedge.app
      groups:
      - app_store_credentials
      vars:
        XCODE_WORKSPACE: TheEdge.xcodeproj/project.xcworkspace
        XCODE_SCHEME: TheEdge
        BUNDLE_ID: guru.theedge.app
      xcode: '16.2'
      cocoapods: default
    scripts:
    - name: Set up code signing
      script: 'keychain initialize

        app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

        keychain add-certificates'
    - name: Build IPA
      script: "SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep\
        \ \"Apple Distribution\" | head -1 | awk -F'\"' '{print $2}')\necho \"Using\
        \ identity: $SIGNING_IDENTITY\"\nxcodebuild archive \\\n  -project TheEdge.xcodeproj\
        \ \\\n  -scheme TheEdge \\\n  -archivePath build/TheEdge.xcarchive \\\n  -destination\
        \ \"generic/platform=iOS\" \\\n  CODE_SIGN_IDENTITY=\"$SIGNING_IDENTITY\"\
        \ \\\n  CODE_SIGN_STYLE=Manual \\\n  PROVISIONING_PROFILE_SPECIFIER=\"\" \\\
        \n  -allowProvisioningUpdates\ncat > build/ExportOptions.plist << 'PLIST'\n\
        <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
        \ PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
        \ version=\"1.0\">\n<dict>\n    <key>method</key>\n    <string>app-store</string>\n\
        \    <key>teamID</key>\n    <string>L4YN74FXDS</string>\n    <key>uploadSymbols</key>\n\
        \    <true/>\n    <key>signingStyle</key>\n    <string>manual</string>\n</dict>\n\
        </plist>\nPLIST\nxcodebuild -exportArchive \\\n  -archivePath build/TheEdge.xcarchive\
        \ \\\n  -exportOptionsPlist build/ExportOptions.plist \\\n  -exportPath build/ipa"
    artifacts:
    - build/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
  android-play-store:
    name: TheEdge Android Play Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
    - name: Set up signing and icons
      script: "cd $CM_BUILD_DIR/android\n# Decode upload keystore\necho \"\"\
        \ | base64 -D > app/upload-keystore.jks\necho \"Keystore decoded: $(ls -la\
        \ app/upload-keystore.jks)\"\n# Generate launcher icons from base64-encoded\
        \ PNGs\nRES_DIR=$CM_BUILD_DIR/android/app/src/main/res\nmkdir -p $RES_DIR/mipmap-mdpi\n\
        echo 'iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAIAAADYYG7QAAAASklEQVR4nO3OoQHAIADAMOCMWf7k9vmZSiaSCzKffcafrNuBL6EiVISKUBEqQkWoCBWhIlSEilARKkJFqAgVoSJUhIpQESpCRai8D90BG9Ab1vQAAAAASUVORK5CYII='\
        \ | base64 -D > $RES_DIR/mipmap-mdpi/ic_launcher.png\necho ''\
        \ | base64 -D > $RES_DIR/mipmap-mdpi/ic_launcher_round.png\nmkdir -p $RES_DIR/mipmap-hdpi\n\
        echo 'iVBORw0KGgoAAAANSUhEUgAAAEgAAABICAIAAADajyQQAAAAcElEQVR4nO3PQQ3AIADAQEAGX3yifSqWpcudgnbuc8cfra8D3mKsxliNsRpjNcZqjNUYqzFWY6zGWI2xGmM1xmqM1RirMVZjrMZYjbEaYzXGaozVGKsxVmOsxliNsRpjNcZqjNUYqzFWY6zGWI2xmgf92QFLVEP31QAAAABJRU5ErkJggg=='\
        \ | base64 -D > $RES_DIR/mipmap-hdpi/ic_launcher.png\necho ''\
        \ | base64 -D > $RES_DIR/mipmap-hdpi/ic_launcher_round.png\nmkdir -p $RES_DIR/mipmap-xhdpi\n\
        echo ''\
        \ | base64 -D > $RES_DIR/mipmap-xhdpi/ic_launcher.png\necho ''\
        \ | base64 -D > $RES_DIR/mipmap-xhdpi/ic_launcher_round.png\nmkdir -p $RES_DIR/mipmap-xxhdpi\n\
        echo ''\
        \ | base64 -D > $RES_DIR/mipmap-xxhdpi/ic_launcher.png\necho ''\
        \ | base64 -D > $RES_DIR/mipmap-xxhdpi/ic_launcher_round.png\nmkdir -p $RES_DIR/mipmap-xxxhdpi\n\
        echo ''\
        \ | base64 -D > $RES_DIR/mipmap-xxxhdpi/ic_launcher.png\necho ''\
        \ | base64 -D > $RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png\necho ''\
        \ | base64 -D > $RES_DIR/mipmap-xxxhdpi/ic_launcher_foreground.png\nmkdir\
        \ -p $RES_DIR/mipmap-anydpi-v26\ncat > $RES_DIR/mipmap-anydpi-v26/ic_launcher.xml\
        \ << 'XMLEOF'\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<adaptive-icon\
        \ xmlns:android=\"http://schemas.android.com/apk/res/android\">\n    <background\
        \ android:drawable=\"@color/ic_launcher_background\"/>\n    <foreground android:drawable=\"\
        @mipmap/ic_launcher_foreground\"/>\n</adaptive-icon>\nXMLEOF\ncat > $RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml\
        \ << 'XMLEOF'\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<adaptive-icon\
        \ xmlns:android=\"http://schemas.android.com/apk/res/android\">\n    <background\
        \ android:drawable=\"@color/ic_launcher_background\"/>\n    <foreground android:drawable=\"\
        @mipmap/ic_launcher_foreground\"/>\n</adaptive-icon>\nXMLEOF\necho 'All icons\
        \ generated successfully!'\nfind $RES_DIR/mipmap-* -type f | head -20\n"
    - name: Build AAB
      script: 'cd $CM_BUILD_DIR/android

        export CM_KEYSTORE_PATH=$CM_BUILD_DIR/android/app/upload-keystore.jks

        export CM_KEYSTORE_PASSWORD=TheEdge2026Upload

        export CM_KEY_ALIAS=upload

        export CM_KEY_PASSWORD=TheEdge2026Upload

        curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o /tmp/gradle-dist.zip

        unzip -q /tmp/gradle-dist.zip -d /tmp/

        echo "Building release AAB..."

        /tmp/gradle-8.6/bin/gradle -p . bundleRelease

        echo "Build complete. AAB files:"

        find . -name "*.aab" -type f -ls'
    artifacts:
    - android/app/build/outputs/bundle/release/*.aab
