workflows:
  ios-app-store:
    name: TheEdge iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic-Prova-Build
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: guru.theedge.app
      groups:
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: "TheEdge.xcodeproj/project.xcworkspace"
        XCODE_SCHEME: "TheEdge"
        BUNDLE_ID: "guru.theedge.app"
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Build IPA
        script: |
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Using identity: $SIGNING_IDENTITY"
          xcodebuild archive \
            -project TheEdge.xcodeproj \
            -scheme TheEdge \
            -archivePath build/TheEdge.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates
          cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>L4YN74FXDS</string>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/TheEdge.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa
    artifacts:
      - build/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-play-store:
    name: TheEdge Android Play Store
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - the_edge_keystore
      java: 17
    scripts:
      - name: Install Gradle
        script: |
          cd $CM_BUILD_DIR/android
          echo "Downloading Gradle 8.6..."
          curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o /tmp/gradle-dist.zip
          unzip -q /tmp/gradle-dist.zip -d /tmp/
          echo "Generating Gradle wrapper..."
          /tmp/gradle-8.6/bin/gradle wrapper --gradle-version 8.6
          chmod +x gradlew
          echo "Gradle wrapper ready"
      - name: Build AAB
        script: |
          cd $CM_BUILD_DIR/android
          echo "Signing config:"
          echo "  CM_KEYSTORE_PATH=$CM_KEYSTORE_PATH"
          echo "  CM_KEY_ALIAS=$CM_KEY_ALIAS"
          ./gradlew bundleRelease
          echo "Build complete. AAB files:"
          find . -name "*.aab" -type f -ls
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
