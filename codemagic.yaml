workflows:
  ios-app-store:
    name: TheEdge iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic-Prova-Build
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: guru.theedge.app
      groups:
      - app_store_credentials
      vars:
        XCODE_WORKSPACE: TheEdge.xcodeproj/project.xcworkspace
        XCODE_SCHEME: TheEdge
        BUNDLE_ID: guru.theedge.app
      xcode: '16.2'
      cocoapods: default
    scripts:
    - name: Set up code signing
      script: 'keychain initialize

        app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

        keychain add-certificates'
    - name: Build IPA
      script: "SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep\
        \ \"Apple Distribution\" | head -1 | awk -F'\"' '{print $2}')\necho \"Using\
        \ identity: $SIGNING_IDENTITY\"\nxcodebuild archive   -project TheEdge.xcodeproj\
        \   -scheme TheEdge   -archivePath build/TheEdge.xcarchive   -destination\
        \ \"generic/platform=iOS\"   CODE_SIGN_IDENTITY=\"$SIGNING_IDENTITY\"   CODE_SIGN_STYLE=Manual\
        \   PROVISIONING_PROFILE_SPECIFIER=\"\"   -allowProvisioningUpdates\ncat >\
        \ build/ExportOptions.plist << 'PLIST'\n<?xml version=\"1.0\" encoding=\"\
        UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
        >\n<plist version=\"1.0\">\n<dict>\n    <key>method</key>\n    <string>app-store</string>\n\
        \    <key>teamID</key>\n    <string>L4YN74FXDS</string>\n    <key>uploadSymbols</key>\n\
        \    <true/>\n    <key>signingStyle</key>\n    <string>manual</string>\n</dict>\n\
        </plist>\nPLIST\nxcodebuild -exportArchive   -archivePath build/TheEdge.xcarchive\
        \   -exportOptionsPlist build/ExportOptions.plist   -exportPath build/ipa"
    artifacts:
    - build/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
  android-play-store:
    name: TheEdge Android Play Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
    - name: Set up signing and icons
      script: "cd $CM_BUILD_DIR/android\necho \"\"\
        \ | base64 -D > app/upload-keystore.jks\necho \"Keystore decoded: $(ls -la\
        \ app/upload-keystore.jks)\"\npython3 << 'ICONS'\nimport struct, zlib, os\n\
        \ndef create_png(w, h, rgb):\n    def chunk(t, d):\n        c = t + d\n  \
        \      return len(d).to_bytes(4, 'big') + c + (zlib.crc32(c) & 0xffffffff).to_bytes(4,\
        \ 'big')\n    hdr = b\"\x89PNG\r\n\x1A\n\"\n    ihdr = chunk(b\"IHDR\", w.to_bytes(4,\"\
        big\") + h.to_bytes(4,\"big\") + bytes([8,2,0,0,0]))\n    raw = b\"\"\n  \
        \  for _ in range(h):\n        raw += b\"\0\" + bytes(rgb) * w\n    idat =\
        \ chunk(b\"IDAT\", zlib.compress(raw))\n    return hdr + ihdr + idat + chunk(b\"\
        IEND\", b\"\")\n\nbase = \"app/src/main/res\"\nfor d, s in [(\"mipmap-mdpi\"\
        ,48),(\"mipmap-hdpi\",72),(\"mipmap-xhdpi\",96),(\"mipmap-xxhdpi\",144),(\"\
        mipmap-xxxhdpi\",192)]:\n    p = f\"{base}/{d}\"\n    os.makedirs(p, exist_ok=True)\n\
        \    png = create_png(s, s, (26,35,126))\n    open(f\"{p}/ic_launcher.png\"\
        ,\"wb\").write(png)\n    open(f\"{p}/ic_launcher_round.png\",\"wb\").write(png)\n\
        \nos.makedirs(f\"{base}/mipmap-anydpi-v26\", exist_ok=True)\nxml = \"\"\"\
        <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<adaptive-icon xmlns:android=\"\
        http://schemas.android.com/apk/res/android\">\n    <background android:drawable=\"\
        @color/ic_launcher_background\"/>\n    <foreground android:drawable=\"@mipmap/ic_launcher_foreground\"\
        />\n</adaptive-icon>\"\"\"\nopen(f\"{base}/mipmap-anydpi-v26/ic_launcher.xml\"\
        ,\"w\").write(xml)\nopen(f\"{base}/mipmap-anydpi-v26/ic_launcher_round.xml\"\
        ,\"w\").write(xml)\nopen(f\"{base}/mipmap-xxxhdpi/ic_launcher_foreground.png\"\
        ,\"wb\").write(create_png(192,192,(255,255,255)))\nprint(\"All icons generated!\"\
        )\nICONS\necho \"Icons generated\"\n"
    - name: Build AAB
      script: 'cd $CM_BUILD_DIR/android

        export CM_KEYSTORE_PATH=$CM_BUILD_DIR/android/app/upload-keystore.jks

        export CM_KEYSTORE_PASSWORD=TheEdge2026Upload

        export CM_KEY_ALIAS=upload

        export CM_KEY_PASSWORD=TheEdge2026Upload

        curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o /tmp/gradle-dist.zip

        unzip -q /tmp/gradle-dist.zip -d /tmp/

        echo "Building release AAB..."

        /tmp/gradle-8.6/bin/gradle -p . bundleRelease

        echo "Build complete. AAB files:"

        find . -name "*.aab" -type f -ls'
    artifacts:
    - android/app/build/outputs/bundle/release/*.aab
